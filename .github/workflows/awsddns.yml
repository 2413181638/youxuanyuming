name: DDNS Update

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: ddns-update
  cancel-in-progress: false

jobs:
  ddns:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: DDNS 检测（每次工作流执行 1 次）
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_DOMAIN: ${{ secrets.CF_DOMAIN }}
          CF_ZONE_NAME: ${{ secrets.CF_ZONE_NAME }}
          AWS_SB_SGT: ${{ secrets.AWS_SB_SGT }}
        run: |
          set -u

          require_env() {
            local name="$1"
            if [ -z "${!name:-}" ]; then
              echo "错误: 缺少必需的 secrets: $name"
              exit 1
            fi
          }

          random_suffix() {
            LC_ALL=C tr -dc 'a-z0-9' </dev/urandom | head -c 12 || true
          }

          curl_json() {
            local url="$1"
            shift
            curl -sS --fail \
              --connect-timeout 10 \
              --max-time 20 \
              --retry 3 \
              --retry-delay 2 \
              --retry-all-errors \
              "$@" \
              "$url"
          }

          require_env CF_API_TOKEN
          require_env CF_DOMAIN
          require_env CF_ZONE_NAME
          require_env AWS_SB_SGT

          ZONE_ID="$(
            curl_json \
              "https://api.cloudflare.com/client/v4/zones?name=$CF_ZONE_NAME" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
            | jq -r '.result[0].id // empty'
          )"

          if [ -z "$ZONE_ID" ]; then
            echo "错误: 无法获取 Cloudflare Zone ID"
            exit 1
          fi

          echo "Cloudflare Zone 已确认"

          echo ""
          echo "===== 开始检测 [$(date '+%H:%M:%S')] ====="

          R1="$(random_suffix)"
          SHARES="$(
            curl_json \
              "https://api.aws.sb/ec2-instance-shares?r=${R1}" \
              -H "x-share-group-token: $AWS_SB_SGT" \
              -H "Referer: https://aws.sb/" \
              -H "Origin: https://aws.sb" \
            2>/dev/null || true
          )"

          INSTANCE_ID="$(echo "$SHARES" | jq -r '.[0].instanceId // empty' 2>/dev/null || true)"
          REGION="$(echo "$SHARES" | jq -r '.[0].regionName // empty' 2>/dev/null || true)"

          if [ -z "$INSTANCE_ID" ] || [ -z "$REGION" ]; then
            echo "错误: 无法获取实例信息"
            exit 1
          fi

          echo "发现实例: $INSTANCE_ID ($REGION)"

          R2="$(random_suffix)"
          RESPONSE="$(
            curl_json \
              "https://api.aws.sb/ec2-instances/${INSTANCE_ID}?r=${R2}" \
              -H "x-share-group-token: $AWS_SB_SGT" \
              -H "x-region-name: $REGION" \
              -H "Referer: https://aws.sb/" \
              -H "Origin: https://aws.sb" \
            2>/dev/null || true
          )"

          NEW_IP="$(echo "$RESPONSE" | jq -r '.publicIpAddress // .ipAddress // empty' 2>/dev/null || true)"

          if [ -z "$NEW_IP" ]; then
            echo "错误: 无法获取实例 IP"
            exit 1
          fi

          echo "aws.sb IP: $NEW_IP"

          RECORD_INFO="$(
            curl_json \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$CF_DOMAIN&type=A" \
              -H "Authorization: Bearer $CF_API_TOKEN"
          )"

          RECORD_ID="$(echo "$RECORD_INFO" | jq -r '.result[0].id // empty')"
          OLD_IP="$(echo "$RECORD_INFO" | jq -r '.result[0].content // empty')"
          echo "CF 当前 IP: ${OLD_IP:-<空>}"

          if [ "$NEW_IP" = "$OLD_IP" ]; then
            echo "IP 未变化，跳过"
            exit 0
          fi

          echo "IP 变化: ${OLD_IP:-<空>} -> $NEW_IP，更新中..."

          if [ -n "$RECORD_ID" ]; then
            METHOD="PUT"
            URL="https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID"
          else
            METHOD="POST"
            URL="https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records"
          fi

          RESULT="$(
            curl_json \
              "$URL" \
              -X "$METHOD" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$CF_DOMAIN\",\"content\":\"$NEW_IP\",\"ttl\":60,\"proxied\":false}"
          )"

          SUCCESS="$(echo "$RESULT" | jq -r '.success // false')"
          if [ "$SUCCESS" = "true" ]; then
            echo "DNS 更新成功: $CF_DOMAIN -> $NEW_IP"
          else
            echo "错误: Cloudflare 更新失败"
            echo "$RESULT" | jq -c '.errors // .'
            exit 1
          fi

          echo ""
          echo "===== 单次检测结束 ====="
